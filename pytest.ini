[pytest]
# ============================================================
# STB Automation Framework — pytest configuration
# ============================================================

# --- Test discovery ---
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# --- Output formatting ---
addopts =
    --tb=short
    --strict-markers
    --show-capture=no
    -v

# --- Logging ---
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)-8s] %(name)s — %(message)s
log_cli_date_format = %H:%M:%S
log_file = logs/pytest.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)-8s] %(name)s:%(lineno)d — %(message)s

# --- Retry on flaky tests (pytest-rerunfailures) ---
# Override at CLI: pytest --reruns 3 --reruns-delay 2
# Default: 2 reruns, 1s delay
reruns = 2
reruns_delay = 1

# --- Timeouts ---
# Per-test timeout in seconds (install pytest-timeout for this)
# timeout = 300

# --- Markers ---
markers =
    smoke: fast sanity checks
    regression: full regression suite
    api: pure API tests (no Appium)
    ui: pure UI tests (Appium only)
    hybrid: API + UI combined tests
    e2e: end-to-end tests   <-- ADD THIS
